name: Build Resume

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Build Spanish resume
        run: typst compile --root . src/es/software-engineer.typ output/resume-es.pdf

      - name: Build English resume
        run: typst compile --root . src/en/software-engineer.typ output/resume-en.pdf

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: resumes
          path: output/*.pdf
